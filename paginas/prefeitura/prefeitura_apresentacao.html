<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Prefeitura - Reciclagem</title>
    <link rel="stylesheet" href="../../style.css">
    <style>
        :root {
            --azul-primario: #1A3B8C;
            --azul-secundario: rgba(255,255,255,0.15);
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar" style="background-color: var(--azul-primario);">
            <div class="sidebar-header">
                <h2>Reciclagem</h2>
                <span class="profile-badge" style="background-color: var(--azul-secundario);">Perfil: Prefeitura</span>
            </div>
            <nav class="menu-nav">
                <a href="prefeitura_apresentacao.html" class="active" style="background-color: rgba(26,59,140,0.5);">Dashboard Municipal</a>
                <a href="prefeitura_ecopontos.html">Gerenciar Ecopontos</a>
                <a href="prefeitura_relatorios.html">Relatórios da Cidade</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../../index.html">Sair do Sistema</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1 style="color: var(--azul-primario);">Dashboard de Sustentabilidade</h1>
                <p>Gestão Municipal do Projeto Arca</p>
            </header>

            <section class="metrics-grid">
                <div class="card-metric" style="border-color: var(--azul-primario);">
                    <h3 style="color: var(--azul-primario);">Total Reciclado (Cidade)</h3>
                    <p style="color: var(--texto-principal);">12.450 Ton</p>
                </div>
                <div class="card-metric" style="border-color: var(--azul-primario);">
                    <h3 style="color: var(--azul-primario);">Ecopontos Ativos</h3>
                    <p style="color: var(--texto-principal);">28</p>
                </div>
                <div class="card-metric" style="border-color: var(--azul-primario);">
                    <h3 style="color: var(--azul-primario);">Economia Gerada</h3>
                    <p style="color: var(--texto-principal);">R$ 45.000</p>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
