<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candidato - Meu Perfil</title>
    <link rel="stylesheet" href="../../style.css">
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Reciclagem</h2>
                <span class="profile-badge">Perfil: Candidato</span>
            </div>
            <nav class="menu-nav">
                <a href="candidato_apresentacao.html">Meu Impacto</a>
                <a href="candidato_coleta.html">Coleta Seletiva</a>
                <a href="candidato_perfil.html" class="active">Meu Perfil</a>
            </nav>
            <div class="sidebar-footer">
                <a href="../../index.html">Sair da Conta</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <h1>Lançamento de Informações</h1>
            </header>

            <section class="content-section">
                <h2>Atualizar Dados Cadastrais</h2>
                <p style="margin-bottom: 20px; color: #555; font-size: 14px;">Preencha os campos abaixo para manter seu cadastro atualizado no projeto Arca.</p>
                
                <form id="formPerfil" onsubmit="alert('Informações atualizadas com sucesso!'); return false;">
                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label for="nomeCompleto">Nome Completo</label>
                            <input type="text" id="nomeCompleto" placeholder="Digite seu nome" required>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label for="cpf">CPF</label>
                            <input type="text" id="cpf" placeholder="000.000.000-00" required>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label for="email">E-mail</label>
                            <input type="email" id="email" placeholder="usuario@exemplo.com" required>
                        </div>
                        <div class="form-group" style="flex: 1; min-width: 250px;">
                            <label for="telefone">Telefone / Celular</label>
                            <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="endereco">Endereço Completo</label>
                        <input type="text" id="endereco" placeholder="Rua, Número, Bairro, Cidade - Estado" required>
                    </div>

                    <div style="display: flex; justify-content: flex-end; margin-top: 20px;">
                        <button type="submit" class="btn-confirmar">Salvar Informações</button>
                    </div>
                </form>
            </section>
        </main>
    </div>

</body>
</html>
